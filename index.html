<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USBBOG 3D</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>

<body>
  <div id="loading">Cargando escena 3D…</div>

  <div id="container">
    <!-- Three.js canvas will be injected here -->
    <div id="canvas-container"></div>

    <!-- ── Side panel ────────────────────────────────────────────────────── -->
    <aside id="side-panel">
      <button class="close-btn" onclick="closePanel()">×</button>
      <h2 class="panel-title" id="panel-title"></h2>
      <div  class="call-to-action" id="call-to-action"></div>
      <p    class="panel-text"     id="panel-text"></p>

      <div class="tags-section">
        <h3>Etiquetas:</h3>
        <div class="tags-container" id="tags-container"></div>
      </div>

      <button class="gallery-btn" id="gallery-btn" onclick="openModal()">
        Ver Galería de Imágenes
      </button>
    </aside>

    <!-- ── Instructions overlay ──────────────────────────────────────────── -->
    <div id="instructions">
      <h3>Universidades San Buenaventura</h3>
      <p>Haz clic en las casas para explorar</p>
    </div>
  </div>

  <!-- ── Image gallery modal ───────────────────────────────────────────────── -->
  <div id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="carousel-container">
        <div class="carousel-slide">
          <img id="carousel-image" src="" alt="Imagen del tema" />
        </div>
        <button class="carousel-btn prev" onclick="prevSlide()">‹</button>
        <button class="carousel-btn next" onclick="nextSlide()">›</button>
      </div>

      <div class="carousel-indicators" id="indicators"></div>
    </div>
  </div>

  <!-- ── Three.js import-map ───────────────────────────────────────────────── -->
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
  }
}
</script>

  <!-- ── App entry point ───────────────────────────────────────────────────── -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
